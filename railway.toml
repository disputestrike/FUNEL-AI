# GoFunnelAI — Railway single-service deploy
#
# ONE Next.js app at repo root. ONE Railway service. No monorepo.
# Background jobs (BullMQ workers) run in-process via Next.js instrumentation hook.
# Scale them out by setting ENABLE_EMBEDDED_WORKERS=0 and deploying a worker
# service that runs `node dist/workers/index.js` separately.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# boot.sh wraps migrations so they NEVER block container startup. If
# DATABASE_URL is missing or migrations fail, we log loudly and start the
# web server anyway — better to serve /api/healthz so Railway sees the
# container alive than to hard-fail at preDeploy with zero diagnostics.
startCommand = "/app/boot.sh"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
sleepApplication = false

# No preDeployCommand. Migrations run inside boot.sh and are non-fatal —
# once env vars are configured, migrations apply on next deploy.
