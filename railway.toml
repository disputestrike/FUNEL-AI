# GoFunnelAI — Railway single-service deploy
#
# ONE Next.js app at repo root. ONE Railway service. No monorepo.
# Background jobs (BullMQ workers) run in-process via Next.js instrumentation hook.
# Scale them out by setting ENABLE_EMBEDDED_WORKERS=0 and deploying a worker
# service that runs `node dist/workers/index.js` separately.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
sleepApplication = false

# Run Prisma migrations before the new container takes traffic.
# Idempotent: safe to re-run on every deploy.
preDeployCommand = "pnpm prisma migrate deploy"
