# Local dev compose for @funnel/workers.
#
# Brings up:
#   - redis (BullMQ backing store)
#   - postgres (Prisma store)
#   - workers (the service itself, in dev mode via tsx)
#
# Usage:
#   docker compose -f apps/workers/docker-compose.yml up

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: funnel
      POSTGRES_PASSWORD: funnel
      POSTGRES_DB: funnel
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U funnel"]
      interval: 5s
      timeout: 3s
      retries: 5

  workers:
    build:
      context: ../..
      dockerfile: apps/workers/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://funnel:funnel@postgres:5432/funnel
      HEALTH_PORT: "8080"
      REGION: local
      RELEASE: dev
    ports:
      - "8080:8080"

volumes:
  redis-data:
  pg-data:
