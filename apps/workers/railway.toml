# funnel-workers — long-running BullMQ workers. Owns every cron and async job.
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/workers/Dockerfile"

[deploy]
startCommand = "node apps/workers/dist/index.js"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 3
# Workers also runs migrations as a safety net — idempotent so running it
# alongside the API's preDeploy is safe. Railway serializes preDeploy per
# service so concurrent runs against the same DB only block briefly on the
# Prisma advisory lock.
preDeployCommand = "bash packages/db/scripts/migrate-on-deploy.sh"

[deploy.resources]
cpu = 2
memoryMB = 2048

# No custom domain — internal service. Health endpoint reachable on
# the Railway private network at workers.railway.internal:8080/healthz.
