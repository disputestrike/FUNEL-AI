# GoFunnelAI web — Railway service config.
# Authoritative settings live in /railway.toml at repo root.
# This file is a thin alias so Railway's per-app detector finds a config.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
sleepApplication = false

preDeployCommand = "pnpm --filter @funnel/db db:migrate:deploy"
