# funnel-grader — Next.js public grader (gofunnelai.com/grade) with grader worker
# emulating the Cloudflare Worker path via @hono/node-server.
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/grader/Dockerfile"

[deploy]
startCommand = "node apps/grader/server.js"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[deploy.resources]
cpu = 1
memoryMB = 1024

