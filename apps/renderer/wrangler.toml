################################################################################
# Funnel Renderer Worker
#
# Serves *.gofunnelai.com workspace subdomains plus every CNAMEd custom domain via
# Cloudflare for SaaS. Hot-path is read-only: KV lookup -> R2 fetch -> respond.
# No DB on the hot path.
################################################################################

name = "funnel-renderer"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
account_id = "${CLOUDFLARE_ACCOUNT_ID}"
send_metrics = true
logpush = true

# Workers Logs / observability â€” always-on for production renderer.
[observability]
enabled = true
head_sampling_rate = 0.05   # 5% head sampling on the hottest path; tail keeps errors.

[placement]
mode = "smart"

[limits]
cpu_ms = 50  # Renderer is tight by design; alert if we approach this.

[[tail_consumers]]
service = "funnel-log-shipper"

# -----------------------------------------------------------------------------
# Routing
# -----------------------------------------------------------------------------
#
# The renderer answers on three classes of hostname:
#   1. the apex (gofunnelai.com) â€” only for marketing-redirect fallback,
#   2. workspace subdomains (*.gofunnelai.com) â€” `slug.gofunnelai.com`,
#   3. any CNAMEd custom domain â€” onboarded via Cloudflare for SaaS so the
#      worker fires on a "fallback origin" route for the custom-hostnames zone.
#
# Editor/admin/marketing live on dedicated hosts (app.gofunnelai.com, admin.gofunnelai.com,
# www.gofunnelai.com) and never touch this worker.

# -----------------------------------------------------------------------------
# Bindings
# -----------------------------------------------------------------------------

# Hyperdrive â€” pooled Postgres read-replica for funnel/workspace lookup.
[[hyperdrive]]
binding = "DB"
id = "${HYPERDRIVE_REPLICA_ID}"

# R2 â€” asset bucket (images, videos, lead-magnet downloads) and audit cache.
[[r2_buckets]]
binding = "FUNNEL_ASSETS"
bucket_name = "funnel-assets"
preview_bucket_name = "funnel-assets-preview"

[[r2_buckets]]
binding = "FUNNEL_LEADMAGNETS"
bucket_name = "funnel-leadmagnets"

# KV â€” page HTML cache + A/B variant assignment sticky map + suspended flags.
[[kv_namespaces]]
binding = "PAGE_CACHE"
id = "${KV_PAGE_CACHE_ID}"

[[kv_namespaces]]
binding = "AB_VARIANTS"
id = "${KV_AB_VARIANTS_ID}"

[[kv_namespaces]]
binding = "AB_CACHE"
id = "${KV_AB_CACHE_ID}"

[[kv_namespaces]]
binding = "DOMAIN_CACHE"
id = "${KV_DOMAIN_CACHE_ID}"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "${KV_RATE_LIMITS_ID}"

# Browser Rendering â€” used for dynamic OG image generation.
browser = { binding = "BROWSER" }

# Queues â€” async lead-capture pipeline. Producer here; consumer is in apps/api.
[[queues.producers]]
binding = "Q_LEAD"
queue = "lead-capture"

[[queues.producers]]
binding = "Q_ANALYTICS"
queue = "analytics-conversions"

# Service binding back to apps/api for synchronous internal RPC (e.g. quick
# fraud check on a lead-capture submission before queueing).
[[services]]
binding = "API"
service = "funnel-api"

# Rate-limit binding â€” per-IP form submission throttling.
[[unsafe.bindings]]
name = "FORM_RATELIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "PAGE_RATELIMIT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 600, period = 60 }

# -----------------------------------------------------------------------------
# Vars (non-secret config)
# -----------------------------------------------------------------------------

[vars]
ENVIRONMENT = "development"
APEX_DOMAIN = "funnel.local"
APP_BASE_URL = "https://app.funnel.local"
API_BASE_URL = "https://api.funnel.local"
ASSETS_PUBLIC_BASE = "https://assets.funnel.local"
CACHE_TTL_FRESH_SECONDS = "60"
CACHE_TTL_STALE_SECONDS = "3600"
DEFAULT_LOCALE = "en"

# Secrets configured via `wrangler secret put`:
#   DATABASE_URL           (Neon serverless â€” Hyperdrive bridges it)
#   FORM_HMAC_SECRET       (signing forms server-side to prevent replay)
#   TURNSTILE_SECRET_KEY
#   GA4_API_SECRET
#   META_CAPI_ACCESS_TOKEN
#   TIKTOK_EVENTS_ACCESS_TOKEN
#   INTERNAL_INGEST_SECRET (bearer between renderer and apps/api lead-ingest)
#   SENTRY_DSN

# -----------------------------------------------------------------------------
# Production environment
# -----------------------------------------------------------------------------

[env.production]
name = "funnel-renderer"
routes = [
  { pattern = "*.gofunnelai.com/*", zone_name = "gofunnelai.com" },
  { pattern = "gofunnelai.com/*", zone_name = "gofunnelai.com" },
  { pattern = "edge.gofunnelai.com/*", zone_name = "gofunnelai.com" },
]
[env.production.vars]
ENVIRONMENT = "production"
APEX_DOMAIN = "gofunnelai.com"
APP_BASE_URL = "https://app.gofunnelai.com"
API_BASE_URL = "https://api.gofunnelai.com"
ASSETS_PUBLIC_BASE = "https://assets.gofunnelai.com"
CACHE_TTL_FRESH_SECONDS = "60"
CACHE_TTL_STALE_SECONDS = "3600"
DEFAULT_LOCALE = "en"

# -----------------------------------------------------------------------------
# Staging environment
# -----------------------------------------------------------------------------

[env.staging]
name = "funnel-renderer-staging"
routes = [
  { pattern = "*.staging.gofunnelai.com/*", zone_name = "gofunnelai.com" },
  { pattern = "edge.staging.gofunnelai.com/*", zone_name = "gofunnelai.com" },
]
[env.staging.vars]
ENVIRONMENT = "staging"
APEX_DOMAIN = "staging.gofunnelai.com"
APP_BASE_URL = "https://app.staging.gofunnelai.com"
API_BASE_URL = "https://api.staging.gofunnelai.com"
ASSETS_PUBLIC_BASE = "https://assets.staging.gofunnelai.com"
CACHE_TTL_FRESH_SECONDS = "10"
CACHE_TTL_STALE_SECONDS = "60"
DEFAULT_LOCALE = "en"
