# funnel-renderer â€” Hono edge renderer running as plain Node on Railway.
# Originally a Cloudflare Worker; the same Hono app boots via
# @hono/node-server (apps/renderer/dist/server.js).
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/renderer/Dockerfile"

[deploy]
startCommand = "node apps/renderer/dist/server.js"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[deploy.resources]
cpu = 1
memoryMB = 768

# Custom domains:
#   pages.gofunnelai.com  (catch-all for *.funnel.page custom domains)
